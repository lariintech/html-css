<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family:"christmas" ;
            src: url(fontes/hello_christmas/Hello-Christmas-trial.ttf) format("truetype");
            font-weight: normal;
            font-style: normal;

    
            /*
            Tipos de format()
            - opentype (.otf)
            - truetype (.ttf)
            - embedded-opentype (.eot)
            - truetype-aap (Apple Advanced Typoraphy)
            - svg
            */
        
        }
        
        body {
            font-family:Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'christmas', Times, serif;
            font-size: 5em;
            font-style: normal;
            font-weight: 200;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Merry christmas</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Totam omnis eius odit corporis distinctio ipsa libero ad animi blanditiis sapiente aperiam cum officia harum possimus, maiores quas quod accusamus magnam?</p>
</body>
</html>
