<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica </h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    
    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>
<h1>Reproduzindo áudio</h1>
<p>Vamos aprender a reproduzir ádios em HTMl5.</p>
<!--MP3 WAV OGG-->
<audio src="midia/Jujutsu Kaisen Opening - KAIKAIKITAN_tv.mp3" controls autoplay></audio>

<h1>Segunda maneira de produzir áudio (mais indicada)</h1>
<audio preload="metadata" autoplay controls loop> 
    <source src="midia/Jujutsu Kaisen Opening - KAIKAIKITAN_tv.mp3" type="audio/mpeg">
    <source src="midia/Jujutsu Kaisen Opening - KAIKAIKITAN_tv.ogg" type="audio/ogg">
    <source src="midia/Jujutsu Kaisen Opening - KAIKAIKITAN_tv.wav" type="audio/wav">
    <p>Infeslizmente seu navegador não consegue reproduzir áudio. <a href="midia/Jujutsu Kaisen Opening - KAIKAIKITAN_tv.mp3">Clique aqui para baixar o arquivo MP3</a></p>
</audio>

</body>
</html>
